<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaLab | Interactive Practice Workspace</title>
    <!-- CodeMirror for syntax-highlighted Java editor -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/closebrackets.min.js"></script>
    <style>
        /* ====== CORE LAYOUT ====== */
        body {
            margin: 0;
            padding: 0;
            background-color: #0A192F;
            color: #CCD6F6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
            
        }

        header {
            width: 100%;
            background-color: rgba(10, 25, 47, 0.95);
            padding: 15px 30px;
            box-sizing: border-box;
            border-bottom: 2px solid #00F0FF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .home-link {
            color: #CCD6F6;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .home-link:hover { color: #00F0FF; }

        .study-tip {
            color: #8892B0;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .brand-name {
            color: #00F0FF;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .workspace {
            display: flex;
            margin-top: 54px;
            height: calc(100vh - 54px);
        }

        #sidebar {
            width: 300px;
            min-width: 300px;
            background-color: #112240;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid #233554;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #sub-sidebar {
            width: 240px;
            min-width: 240px;
            background-color: #0f1e35;
            padding: 20px 14px;
            display: none;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid #233554;
            box-sizing: border-box;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { width: 0; opacity: 0; }
            to { width: 240px; opacity: 1; }
        }

        #display-window {
            flex: 1;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #display-window.centered-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #display-window.centered-view h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        #display-window.centered-view p {
            max-width: 520px;
            font-size: 1.15rem;
            line-height: 1.7;
            color: #8892B0;
        }

        /* ====== SIDEBAR BUTTONS ====== */
        button {
            background: #172A45;
            color: #CCD6F6;
            border: 1px solid #233554;
            padding: 14px 16px;
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        button:hover:not(:disabled) {
            border-color: #00F0FF;
            color: #00F0FF;
            transform: translateX(3px);
        }

        button:disabled {
            color: #8892B0;
            border-color: #233554;
            cursor: not-allowed;
            opacity: 0.4;
            background: linear-gradient(to top right, transparent calc(50% - 1px), #495670 calc(50% - 1px), #495670 calc(50% + 1px), transparent calc(50% + 1px)), #172A45;
        }

        button:disabled:hover {
            transform: none;
            color: #8892B0;
            border-color: #233554;
        }

        /* Active unit indicator — highlights the unit you're currently on */
        #sidebar button.active-unit {
            border-color: #00F0FF;
            color: #00F0FF;
            background: #15375a;
            box-shadow: inset 3px 0 0 #00F0FF;
        }
        #sidebar button.active-unit:hover:not(:disabled) {
            transform: none;
        }

        /* Let long unit titles wrap instead of getting cut off */
        #sidebar .unit-btn {
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            line-height: 1.3;
        }

        /* ====== INLINE ACCORDION DRAWER (quiz/exam list under a unit) ====== */
        .unit-drawer {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin: -2px 0 2px 12px;
            padding-left: 12px;
            border-left: 2px solid #233554;
        }
        .unit-drawer.open { display: flex; }
        .unit-drawer button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            background: #0f1e35;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 11px 13px;
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            text-align: left;
            line-height: 1.3;
        }
        .unit-drawer button .drawer-arrow { flex-shrink: 0; }
        .unit-drawer button.selected-test {
            border-color: #00F0FF;
            color: #00F0FF;
            box-shadow: inset 2px 0 0 #00F0FF;
        }

        #sub-sidebar button {
            background: #112240;
            font-size: 0.9rem;
        }

        #sub-sidebar button:hover:not(:disabled) {
            border-color: #00F0FF;
            color: #00F0FF;
        }

        #sub-sidebar button.selected-module {
            border-color: #00F0FF;
            color: #00F0FF;
            box-shadow: inset 2px 0 0 #00F0FF;
        }

        #sub-sidebar button:disabled {
            background: linear-gradient(to top right, transparent calc(50% - 1px), #495670 calc(50% - 1px), #495670 calc(50% + 1px), transparent calc(50% + 1px)), #112240;
        }

        /* ====== QUIZ ELEMENTS ====== */
        .option-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            background: #112240;
            color: #CCD6F6;
            border: 1px solid #233554;
            text-align: left;
            font-weight: normal;
            white-space: normal;
        }

        .option-btn:hover:not(.answered) { transform: none; }

        .option-btn.selected-state {
            border-color: #00F0FF;
            background: rgba(0, 240, 255, 0.1);
        }

        .option-btn.answered {
            pointer-events: none;
            cursor: default;
            opacity: 1;
        }

        .option-btn.answer-correct {
            border-color: #4ade80 !important;
            background: rgba(74, 222, 128, 0.08) !important;
        }

        .option-btn.answer-wrong {
            border-color: #f87171 !important;
            background: rgba(248, 113, 113, 0.08) !important;
        }

        .action-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: transparent;
            color: #00F0FF;
            border: 2px solid #00F0FF;
            font-weight: bold;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: transparent;
        }

        .next-btn {
            background: #00F0FF;
            color: #0A192F;
            font-weight: bold;
            border-color: #00F0FF;
        }

        .input-field {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            background: #112240;
            border: 1px solid #233554;
            color: #CCD6F6;
            margin-top: 10px;
            border-radius: 4px;
            font-size: 1rem;
        }

        .input-field:focus { outline: none; border-color: #00F0FF; }

        .feedback { margin-top: 15px; font-size: 1.1rem; }

        /* ====== INTERACTIVE TAXONOMY QUIZ ====== */
        .taxo-diagram {
            background: #0d1f38;
            border: 1px solid #233554;
            border-radius: 8px;
            padding: 18px 10px;
            margin-bottom: 22px;
            overflow-x: auto;
        }
        .interactive-q { margin-bottom: 18px; }
        .code-trace {
            background: #020C1B;
            border: 1px solid #233554;
            border-radius: 8px;
            padding: 16px 18px;
            margin-bottom: 18px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.55;
            color: #CCD6F6;
            overflow-x: auto;
            white-space: pre;
        }

        .correct { color: #4ade80; font-weight: bold; }
        .wrong { color: #f87171; font-weight: bold; }
        .explanation-text { color: #8892B0; display: block; margin-top: 5px; }

        .explanation-breakdown {
            background: #0d1b2e;
            border: 1px solid #233554;
            border-radius: 6px;
            padding: 20px;
            margin-top: 18px;
        }

        .explanation-breakdown .exp-row {
            padding: 10px 0;
            border-bottom: 1px solid #1a2d4a;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .explanation-breakdown .exp-row:last-child { border-bottom: none; }
        .exp-label { font-weight: bold; margin-right: 6px; }
        .exp-label.exp-correct { color: #4ade80; }
        .exp-label.exp-wrong { color: #f87171; }

        .ai-hint {
            background: #0d1b2e;
            border: 1px solid #233554;
            border-left: 3px solid #00F0FF;
            border-radius: 0 6px 6px 0;
            padding: 16px 20px;
            margin-top: 14px;
            line-height: 1.6;
        }

        .ai-hint-header {
            color: #00F0FF;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        /* ====== IDE WORKSPACE ====== */
        .ide-wrapper { display: flex; gap: 20px; margin-top: 15px; align-items: flex-start; }
        .ide-left { flex: 1.2; display: flex; flex-direction: column; min-width: 0; }
        .ide-right { flex: 0.8; display: flex; flex-direction: column; min-width: 0; }
        .scrollable-prompt { background: #112240; padding: 15px; border: 1px solid #233554; border-bottom: none; border-radius: 6px 6px 0 0; line-height: 1.5; }
        /* CodeMirror overrides to match theme */
        .CodeMirror {
            height: 150px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            border: 1px solid #233554;
            border-radius: 0 0 6px 6px;
            background: #282a36;
        }
        .CodeMirror.tall { height: 280px; }
        .CodeMirror-focused { border-color: #00F0FF !important; }
        .CodeMirror-scroll { padding: 4px 0; }
        /* Dark, theme-matched scrollbars (kills the white scrollbar tab at the editor bottom) */
        .CodeMirror-scrollbar-filler, .CodeMirror-gutter-filler { background: #282a36 !important; }
        .CodeMirror-vscrollbar::-webkit-scrollbar, .CodeMirror-hscrollbar::-webkit-scrollbar,
        .CodeMirror-scroll::-webkit-scrollbar { width: 9px; height: 9px; }
        .CodeMirror-vscrollbar::-webkit-scrollbar-track, .CodeMirror-hscrollbar::-webkit-scrollbar-track,
        .CodeMirror-scroll::-webkit-scrollbar-track { background: #282a36; }
        .CodeMirror-vscrollbar::-webkit-scrollbar-thumb, .CodeMirror-hscrollbar::-webkit-scrollbar-thumb,
        .CodeMirror-scroll::-webkit-scrollbar-thumb { background: #44475a; border-radius: 5px; }
        /* Keep old textarea class for short-form Unit 2 questions */
        .code-editor { width: 100%; height: 150px; background: #020C1B; border: 1px solid #233554; color: #a9b7c6; font-family: 'Courier New', Courier, monospace; font-size: 1rem; padding: 12px; box-sizing: border-box; resize: none; border-radius: 0 0 6px 6px; }
        .code-editor:focus { outline: none; border-color: #00F0FF; }
        .console-box { background: #020C1B; border: 1px solid #233554; min-height: 235px; font-family: 'Courier New', Courier, monospace; padding: 15px; box-sizing: border-box; white-space: normal; border-radius: 6px; text-align: left; font-size: 0.9rem; line-height: 1.5; }
        .console-header { color: #8892B0; font-size: 0.8rem; border-bottom: 1px solid #233554; padding-bottom: 5px; margin-bottom: 10px; font-family: 'Segoe UI', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        /* Run / Submit button row */
        .btn-row { display: flex; gap: 12px; align-items: center; margin-top: 15px; }
        .btn-row .action-btn { margin-top: 0; }
        /* Read-only solution editor (answer key) auto-sizes to its content */
        .CodeMirror.solution-cm { height: auto; border-radius: 6px; margin-top: 4px; }

        .challenge-container {
            background: #112240;
            padding: 30px;
            border: 2px solid #233554;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 10px 30px -15px rgba(2,12,27,0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .challenge-container.success-highlight { border-color: #4ade80; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="home-link">Home</a>
        <span class="study-tip">Tip: Review concept breakdowns first, then take practice tests</span>
        <div class="brand-name">JavaLab</div>
    </header>

    <div class="workspace">
        <div id="sidebar">
            <span style="color:#8892B0; font-size:0.75rem; font-weight:bold; letter-spacing:1px; text-transform:uppercase; padding:0 4px; margin-bottom:4px;">Practice Units</span>
            <button class="unit-btn" data-unit="1" onclick="toggleUnit(1)">Unit 1: Computer Fundamentals</button>
            <div class="unit-drawer" id="drawer-1"></div>
            <button class="unit-btn" data-unit="2" onclick="toggleUnit(2)">Unit 2: IO, Data Types &amp; Formatting</button>
            <div class="unit-drawer" id="drawer-2"></div>
            <button class="unit-btn" data-unit="3" onclick="toggleUnit(3)">Unit 3: Methods &amp; Classes</button>
            <div class="unit-drawer" id="drawer-3"></div>
            <button class="unit-btn" data-unit="4" onclick="toggleUnit(4)">Unit 4: Inheritance &amp; If/Else</button>
            <div class="unit-drawer" id="drawer-4"></div>
            <button disabled>Unit 5: Loops &amp; Iteration</button>
            <button disabled>Unit 6: Single Arrays</button>
            <button disabled>Unit 7: 2D Arrays</button>
            <button disabled>Unit 8: ArrayLists</button>
            <button disabled>Unit 9: Recursion &amp; Sorting</button>
        </div>

        <div id="sub-sidebar"></div>

        <div id="display-window" class="centered-view">
            <h1>Online Practice Tests</h1>
            <p>Welcome to the testing sandbox. Use these interactive quizzes to study, practice logic, and write error-free code before your upcoming unit exams.</p>
        </div>
    </div>

    <script>
        // ====== UTILITY ======
        function shuffleArray(arr) {
            const s = [...arr];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        // ====== MULTIPLE CHOICE DATABASE (10 questions, 7 shown per quiz) ======
        const mcQuestions = [
            {
                title: "Question", prompt: "If ASCII character '0' has a decimal value of 48, what is the decimal value of ASCII character '7'?",
                options: ["A) 57","B) 7","C) 55","D) 48"], correctIndex: 2,
                optionExplanations: [
                    "57 would be ASCII '9' (48+9). Character '7' is only 7 positions after '0'.",
                    "7 is the digit character itself, not its ASCII code. Each character has a unique numeric code.",
                    "Correct. ASCII digits are sequential starting at 48. So '7' = 48 + 7 = 55.",
                    "48 is the code for '0'. Each digit after '0' increments by 1, so '7' = 55."
                ]
            },
            {
                title: "Question", prompt: "What is the hexadecimal equivalent of binary 1101 0110?",
                options: ["A) 6D","B) B6","C) D4","D) D6"], correctIndex: 3,
                optionExplanations: [
                    "6D reverses the nibble order. Always process nibbles left to right.",
                    "B6 would be 1011 0110. The upper nibble 1101 = D (13), not B (11).",
                    "D4 would be 1101 0100. The lower nibble 0110 = 6, not 4.",
                    "Correct. Split into nibbles: 1101 = D (13), 0110 = 6. Combined: D6."
                ]
            },
            {
                title: "Question", prompt: "Which of the following binary numbers equals decimal 202?",
                options: ["A) 1100 1100","B) 1100 1010","C) 1101 0010","D) 1100 0110"], correctIndex: 1,
                optionExplanations: [
                    "1100 1100 = 128 + 64 + 8 + 4 = 204. Off by 2.",
                    "Correct. 128 + 64 + 8 + 2 = 202.",
                    "1101 0010 = 128 + 64 + 16 + 2 = 210. Off by 8.",
                    "1100 0110 = 128 + 64 + 4 + 2 = 198. Off by 4."
                ]
            },
            {
                title: "Question", prompt: "What is the hexadecimal equivalent of decimal 200?",
                options: ["A) D0","B) CA","C) C8","D) B8"], correctIndex: 2,
                optionExplanations: [
                    "D0 = 13×16 + 0 = 208, not 200.",
                    "CA = 12×16 + 10 = 202, not 200.",
                    "Correct. 200 ÷ 16 = 12 remainder 8. 12 = C in hex, so C8.",
                    "B8 = 11×16 + 8 = 184, not 200."
                ]
            },
            {
                title: "Question", prompt: "What is the binary equivalent of hexadecimal 3F?",
                options: ["A) 0011 1110","B) 0111 1100","C) 0011 1011","D) 0011 1111"], correctIndex: 3,
                optionExplanations: [
                    "0011 1110 = hex 3E. The digit F converts to 1111, not 1110.",
                    "0111 1100 = hex 7C. You may have reversed or misread the nibbles.",
                    "0011 1011 = hex 3B. F = 1111, not 1011 (which is B).",
                    "Correct. 3 = 0011, F = 1111. Combined: 0011 1111."
                ]
            },
            {
                title: "Question", prompt: "Which of the following statements about Windows is TRUE?",
                options: [
                    "A) There is only one way to take a screenshot on Windows",
                    "B) You should always log out when done using a shared computer",
                    "C) Ctrl+P is the keyboard shortcut for pasting content",
                    "D) Files save automatically when you close Notepad without saving"
                ], correctIndex: 1,
                optionExplanations: [
                    "False. Windows has multiple screenshot methods: Print Screen, Snipping Tool, Win+Shift+S, and more.",
                    "Correct. Logging out protects your accounts and personal data, especially on shared or school computers.",
                    "False. Ctrl+P opens the Print dialog. Ctrl+V is the shortcut for pasting.",
                    "False. Notepad prompts you to save unsaved changes. Clicking 'Don't Save' discards your work."
                ]
            },
            {
                title: "Question", prompt: "Which keyboard shortcut is correctly paired with its function?",
                options: [
                    "A) Ctrl+C → Cut content",
                    "B) Ctrl+X → Copy content",
                    "C) Ctrl+V → Paste content",
                    "D) Ctrl+Z → Redo last action"
                ], correctIndex: 2,
                optionExplanations: [
                    "Ctrl+C is for Copy, not Cut. Remember: C = Copy. Ctrl+X is for Cut.",
                    "Ctrl+X is for Cut, not Copy. Think of X as scissors cutting.",
                    "Correct. Ctrl+V pastes content from the clipboard into the current location.",
                    "Ctrl+Z is for Undo, not Redo. Ctrl+Y is typically used for Redo."
                ]
            },
            {
                title: "Question", prompt: "What does Ctrl+Shift+N do in Windows File Explorer?",
                options: [
                    "A) Opens a new browser window in incognito mode",
                    "B) Creates a new folder in the currently open directory",
                    "C) Always creates a new folder on the Desktop",
                    "D) Creates a new blank text document"
                ], correctIndex: 1,
                optionExplanations: [
                    "In a browser, Ctrl+Shift+N opens incognito/private mode — but in File Explorer it creates a new folder.",
                    "Correct. In File Explorer, Ctrl+Shift+N creates a new folder in whatever directory you currently have open.",
                    "It creates a folder in the active File Explorer location, which could be any directory — not always the Desktop.",
                    "Ctrl+Shift+N creates a folder, not a text file. Right-click → New → Text Document is how you create a .txt file."
                ]
            },
            {
                title: "Question", prompt: "A school's wifi transfers data at 280 KBps. A student's project took 7.5 minutes to upload. Approximately how large was the file?",
                options: ["A) 2,100 MB","B) 20.51 MB","C) 126.00 MB","D) 123.05 MB"], correctIndex: 3,
                optionExplanations: [
                    "2,100 MB — you multiplied 280 × 7.5 without converting minutes to seconds first.",
                    "20.51 MB — you may have divided by 1024 an extra time (KB → MB is only one ÷1024).",
                    "126.00 MB — close, but you forgot to convert KB to MB. 126,000 KB ÷ 1024 = 123.05 MB.",
                    "Correct. 7.5 min = 450 sec. 280 KB/s × 450 = 126,000 KB ÷ 1024 ≈ 123.05 MB."
                ]
            },
            {
                title: "Question", prompt: "A tablet has 64 GB of storage. A school wants to upgrade to devices with 12 times the capacity. What is the new storage requirement in Terabytes?",
                options: ["A) 0.75 TB","B) 7.68 TB","C) 768 TB","D) 0.064 TB"], correctIndex: 0,
                optionExplanations: [
                    "Correct. 64 × 12 = 768 GB. 768 GB ÷ 1024 = 0.75 TB.",
                    "7.68 TB — you may have divided by 100 instead of 1024. Storage uses base-1024.",
                    "768 TB — you multiplied correctly (768 GB) but forgot to convert GB → TB (÷1024).",
                    "0.064 TB — you converted 64 GB to TB without multiplying by 12 first."
                ]
            }
        ];

        // ====== FILL IN THE BLANK DATABASE (20 questions, 15 shown per quiz) ======
        const blankQuestions = [
            // --- CLASS POLICIES ---
            { title: "Class Policy", prompt: "How many late passes is a student permitted to use per semester?",
              snippet: "Late passes per semester: <span style='color:#00F0FF; font-weight:bold;'>[?]</span>",
              correct: "2", caseSensitive: true, alternates: ["two"], category: "policy" },

            { title: "Class Policy", prompt: "Using a late pass allows you to turn in an assignment how many days late?",
              snippet: "Days late with one pass: <span style='color:#00F0FF; font-weight:bold;'>[?]</span>",
              correct: "1", caseSensitive: true, alternates: ["one"], category: "policy" },

            { title: "Grade Calculation", prompt: "A student earned: Homework 92% (30%), Exams 88% (30%), Participation 95% (20%), Quizzes 90% (5%). What minimum integer score on the Final Exam (15%) is needed for a 90% overall?",
              snippet: "30(92) + 30(88) + 20(95) + 5(90) + 15(<span style='color:#00F0FF; font-weight:bold;'>[?]</span>) = 9000",
              correct: "84", caseSensitive: true, alternates: [], category: "grade-calc" },

            { title: "Grade Calculation", prompt: "A student earned: Homework 94% (30%), Exams 86% (30%), Participation 92% (20%), Quizzes 88% (5%). What minimum integer score on the Final Exam (15%) is needed for a 90% overall?",

                explanation: q.optionExplanations[idx],
                isCorrect: idx === q.correctIndex
            }));
            currentShuffledOptions = shuffleArray(paired);
            currentCorrectIndex = currentShuffledOptions.findIndex(o => o.isCorrect);
            let optionsHTML = "";
            currentShuffledOptions.forEach((opt, idx) => {
                optionsHTML += `<button class="option-btn" onclick="stageOptionSelection(${idx})">${labels[idx]}) ${opt.text}</button>`;
            });
            displayWindow.innerHTML = `
                <h1>${getUnitTitle()}: Multiple Choice</h1>
                <div class="challenge-container">
                    <h3>${q.title} ${index + 1} of ${activeMC.length}</h3>
                    <p style="color:#CCD6F6;">${q.prompt}</p>
                    <div id="options-container">${optionsHTML}</div>
                    <button class="action-btn" id="submit-choice-btn" onclick="commitMultipleChoiceAnswer()" disabled>Submit Answer</button>
                    <div class="feedback" id="challenge-feedback"></div>
                    <div id="explanation-area"></div>
                    <button class="action-btn next-btn" id="next-q-btn" style="display:none;" onclick="loadMCGeneric(${index + 1})">Next Question &rarr;</button>
                </div>
            `;
        }

        function stageOptionSelection(idx) {
            selectedOptionIndex = idx;
            const allOptions = document.querySelectorAll('.option-btn');
            allOptions.forEach(opt => opt.classList.remove('selected-state'));
            if(allOptions[idx]) allOptions[idx].classList.add('selected-state');

            if(submitBtn) submitBtn.disabled = false;

        function commitMultipleChoiceAnswer() {
            const fb = document.getElementById('challenge-feedback');
            const expArea = document.getElementById('explanation-area');
            const allOptions = document.querySelectorAll('.option-btn');
            const submitBtn = document.getElementById('submit-choice-btn');
            const nextBtn = document.getElementById('next-q-btn');

            allOptions.forEach((opt, idx) => {
                opt.classList.add('answered');
                opt.classList.remove('selected-state');
                if (idx === currentCorrectIndex) {
                    opt.classList.add('answer-correct');
                } else if (idx === selectedOptionIndex) {
                    opt.classList.add('answer-wrong');
                }
            });

            if(submitBtn) submitBtn.style.display = "none";

            if (selectedOptionIndex === currentCorrectIndex) {
                if(fb) fb.innerHTML = `<span class="correct">✓ Correct!</span>`;
                score++;
            } else {
                if(fb) fb.innerHTML = `<span class="wrong">✗ Incorrect.</span>`;
            }

            let breakdownHTML = '<div class="explanation-breakdown">';
            const labels = ['A','B','C','D'];
            currentShuffledOptions.forEach((opt, idx) => {
                const isRight = idx === currentCorrectIndex;
                breakdownHTML += `<div class="exp-row"><span class="exp-label ${isRight ? 'exp-correct' : 'exp-wrong'}">${isRight ? '✓' : '✗'} ${labels[idx]})</span> <span style="color:#CCD6F6;">${opt.explanation}</span></div>`;
            });
            breakdownHTML += '</div>';
            if(expArea) expArea.innerHTML = breakdownHTML;
            if(nextBtn) nextBtn.style.display = "inline-block";
        }

        // ====== FILL IN THE BLANK CONTROLLER ======
        function checkBlankAnswer(q, ans) {
            const trimmed = ans.trim();
            const correct = q.correct;
            if (trimmed === correct) return true;
            if (!q.caseSensitive && trimmed.toLowerCase() === correct.toLowerCase()) return true;
            if (q.alternates) {
                for (const alt of q.alternates) {
                    if (!q.caseSensitive && trimmed.toLowerCase() === alt.toLowerCase()) return true;
                    if (trimmed === alt) return true;
                }
            }
            if (q.category && (q.category.includes("bin") || q.category === "hex-bin")) {
                if (trimmed.replace(/\s/g, '') === correct.replace(/\s/g, '')) return true;
            }
            return false;
        }

        function getBlankHint(q, ans) {
            if (!ans) return "You didn't enter an answer. Give it a try!";
            switch(q.category) {
                case "policy":
                    return `<code>${ans}</code> is not correct. Review the class syllabus — these are specific rules your teacher set for the course.`;
                case "grade-calc":
                    if (isNaN(ans)) return "The answer should be a whole number. Multiply each grade × weight, add them, then solve: total + 15(x) = 9000.";
                    const target = parseInt(q.correct);
                    const guess = parseInt(ans);
                    if (guess === target - 1) return `Very close! You got ${ans}, but you need to round <strong>up</strong> to the next integer since you can't score a fraction.`;
                    if (guess < target) return `${ans} is too low. Steps: 1) Multiply each grade by its weight. 2) Add all products. 3) Subtract from 9000. 4) Divide by 15. 5) Round UP to integer.`;
                    if (guess > target) return `${ans} is too high. Double-check your arithmetic: multiply each grade by its weight, sum them, subtract from 9000, divide by 15.`;
                    return `${ans} is not correct. Set up the equation: sum of (weight × grade) + 15(x) = 9000, then solve for x.`;
                case "ascii":
                    if (ans === "7") return "That's the digit character itself, not its ASCII code. ASCII digits start at 48 ('0'=48), so count forward.";
                    if (ans === "48") return "48 is the code for '0'. The question asks for '7', which is 7 positions later: 48 + 7 = <strong>55</strong>.";
                    return `<code>${ans}</code> is not correct. ASCII digit characters start at 48 ('0') and go up: '1'=49, '2'=50 ... '7'=55.`;
                case "bin-hex":
                    if (/[^0-9a-fA-F]/.test(ans)) return "Hexadecimal only uses digits 0-9 and letters A-F.";
                    if (/^\d+$/.test(ans) && !isNaN(ans)) return "That looks like a decimal value. For hex, split the binary into nibbles (groups of 4) and convert each to a hex digit.";
                    return `<code>${ans}</code> is not correct. Split into nibbles: 0000=0 ... 1001=9, 1010=A, 1011=B, 1100=C, 1101=D, 1110=E, 1111=F.`;
                case "bin-dec":
                    if (/[a-fA-F]/.test(ans)) return "That looks like hex. For decimal, add up place values: 128, 64, 32, 16, 8, 4, 2, 1 (left to right).";
                    return `<code>${ans}</code> is not correct. Multiply each bit by its place value (128, 64, 32, 16, 8, 4, 2, 1) and add them together.`;
                case "dec-hex":
                    if (/[^0-9a-fA-F]/.test(ans)) return "Hex uses only 0-9 and A-F.";
                    if (/^[01]+$/.test(ans) && ans.length > 3) return "That looks like binary, not hex. Divide the decimal by 16 to get hex digits.";
                    return `<code>${ans}</code> is not correct. Divide by 16: quotient = first hex digit, remainder = second. A=10, B=11, C=12, D=13, E=14, F=15.`;
                case "dec-bin":
                    if (/[^01\s]/.test(ans)) return "Binary only uses 0s and 1s.";
                    return `<code>${ans}</code> is not correct. Repeatedly divide by 2 and read remainders bottom-to-top.`;
                case "hex-dec":
                    if (/[a-fA-F]/.test(ans)) return "The answer should be a plain decimal number (0-9 only).";
                    return `<code>${ans}</code> is not correct. Multiply the first hex digit by 16, then add the second. A=10, B=11, C=12, D=13, E=14, F=15.`;
                case "hex-bin":
                    if (/[^01\s]/.test(ans)) return "Binary only uses 0s and 1s.";
                    return `<code>${ans}</code> is not correct. Convert each hex digit to 4-bit binary: 3=0011, F=1111, A=1010, C=1100, etc.`;
                case "memory-calc":
                    if (isNaN(ans)) return "The answer should be a number. Steps: 1) Convert minutes to seconds. 2) Multiply rate × time for total KB. 3) Divide by 1024 for MB, again for GB, again for TB.";
                    return `<code>${ans}</code> is not correct. Steps: 1) Convert time to seconds (×60). 2) Multiply rate × seconds = total KB. 3) Divide by 1024 for each unit step (KB→MB→GB→TB). Round to 2 decimal places.`;
                case "shortcut":
                    const map = {"ctrl+c":"copy","ctrl+v":"paste","ctrl+p":"print","ctrl+x":"cut","ctrl+z":"undo","ctrl+s":"save"};
                    if (map[ans.toLowerCase()]) return `You typed the key combination, but the question asks for the <em>function name</em>. ${ans} performs: <strong>${map[ans.toLowerCase()]}</strong>.`;
                    if (["copy","paste","print","cut","undo","save"].includes(ans.toLowerCase())) return `<code>${ans}</code> is not the right function for this shortcut. Remember: Ctrl+C=copy, Ctrl+V=paste, Ctrl+X=cut, Ctrl+Z=undo, Ctrl+P=print.`;
                    return `<code>${ans}</code> is not correct. Common shortcuts: Ctrl+C=copy, Ctrl+V=paste, Ctrl+X=cut, Ctrl+Z=undo.`;
                case "newline":
                    if (ans === "1") return "1 byte would be just a Line Feed (LF). On Windows, a newline uses <strong>both</strong> Carriage Return (CR) and Line Feed (LF) = 2 bytes.";
                    if (ans === "4") return "A newline on Windows is only 2 bytes (CR + LF), not 4.";
                    return `<code>${ans}</code> is not correct. Windows uses CRLF for newlines: CR (1 byte) + LF (1 byte) = 2 bytes.`;
                case "bits":
                    if (ans === "4") return "4 bits make a nibble (half a byte). A full byte = <strong>8</strong> bits.";
                    if (ans === "16") return "16 bits = 2 bytes. A single byte is <strong>8</strong> bits.";
                    return `<code>${ans}</code> is not correct. 1 byte = 8 bits — the most fundamental unit in computing.`;
                default:
                    return `<code>${ans}</code> is not correct. The correct answer is: <code>${q.correct}</code>.`;
            }
        }

        function evalBlankGeneric() {
            const q = activeBlank[currentQuestionIndex];

            const fb = document.getElementById('challenge-feedback');

            const normAns = normLines(rawAns);
            const normCorrect = normLines(q.correct);

            let isCorrect = normAns === normCorrect;
            if (!isCorrect && !q.caseSensitive) isCorrect = normAns.toLowerCase() === normCorrect.toLowerCase();
            if (!isCorrect && q.alternates) {
                isCorrect = q.alternates.some(a => normAns === normLines(a) || (!q.caseSensitive && normAns.toLowerCase() === normLines(a).toLowerCase()));
            }

            const displayCorrect = q.correct.replace(/\n/g, '<br>');

        function getGenericBlankHint(q, ans) {
            if (!ans) return "You didn't enter an answer. Try tracing through the code line by line.";
            switch(q.category) {
                case "print-output":
                    return `<code>${ans}</code> is not correct. <code>print()</code> keeps the cursor on the same line, <code>println()</code> adds a newline after.`;
                case "print-multiline":
                    return `Not quite. Trace line by line: <code>println()</code> ends the current line. <code>print()</code> keeps the cursor on the same line. <code>\\n</code> inside a string starts a new line.`;
                case "concat":
                    return `<code>${ans}</code> is not correct. Java evaluates left to right: once it hits a String, everything after uses concatenation. Numbers before the first String are added normally.`;
                case "expression":
                    return `<code>${ans}</code> is not correct. Follow order of operations (PEMDAS): first *, /, % left to right, then +, - left to right. Watch for integer division (no decimals) vs float division.`;
                case "datatype":
                    return `<code>${ans}</code> is not correct. Remember: any operation involving a <code>double</code> produces <code>double</code>. Integer-only operations produce <code>int</code>. Explicit casts override the natural type.`;
                case "output-multi":
                    return `Not quite. Trace each line of code in order. Check whether each uses <code>print</code> or <code>println</code>. Press Enter in your answer where the output moves to a new line.`;
                case "casting":
                    return `<code>${ans}</code> is not correct. <code>(int)</code> truncates decimals — it does NOT round. <code>(char)</code> converts a number to its ASCII character. <code>(double)</code> enables decimal division.`;
                case "method":
                    return `<code>${ans}</code> is not correct. A method header reads: access specifier, return type, name, then (parameters). The name comes right before the parentheses; the return type comes right before the name.`;
                case "class":
                    return `<code>${ans}</code> is not correct. A class holds fields (declared in the class body) and methods. Use the <code>class</code> keyword to declare it and <code>new</code> to build an object from it.`;
                case "constructor":
                    return `<code>${ans}</code> is not correct. A constructor shares the class name, has no return type, and uses <code>this.field = field;</code> to set fields. A no-args constructor has empty parentheses.`;
                case "inheritance":
                    return `<code>${ans}</code> is not correct. Use <code>extends</code> in the header, <code>super(...)</code> to call the parent constructor, and <code>super.method()</code> to run the parent's version of an overridden method.`;
                default:
                    return `<code>${ans}</code> is not correct. Review the concept and try again.`;
            }
        }

        // ====== JAVA COMPILER SIMULATION (for the Run button) ======
        function escapeHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
        function levDist(a, b) {
            const m = a.length, n = b.length;
            const d = Array.from({length: m+1}, (_, i) => [i, ...Array(n).fill(0)]);
            for (let j = 0; j <= n; j++) d[0][j] = j;
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    d[i][j] = Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1] + (a[i-1]===b[j-1]?0:1));
            return d[m][n];
        }
        function classNameOf(code) {
            const m = code.match(/class\s+([A-Za-z_]\w*)/);
            return m ? m[1] : 'Main';
        }
        // Remove string/char literals and comments (keep newlines) so structural checks aren't fooled
        function stripLiterals(code) {
            let out = '', i = 0;
            let inStr=false, inChar=false, inLine=false, inBlock=false;
            while (i < code.length) {
                const c = code[i], n = code[i+1];
                if (inLine) { if (c === '\n'){ inLine=false; out+=c; } i++; continue; }
                if (inBlock) { if (c==='*' && n==='/'){ inBlock=false; i+=2; } else { if(c==='\n') out+=c; i++; } continue; }
                if (inStr) { if (c==='\\'){ i+=2; continue; } if (c==='"') inStr=false; i++; continue; }
                if (inChar) { if (c==='\\'){ i+=2; continue; } if (c==="'") inChar=false; i++; continue; }
                if (c==='/' && n==='/'){ inLine=true; i+=2; continue; }
                if (c==='/' && n==='*'){ inBlock=true; i+=2; continue; }
                if (c==='"'){ inStr=true; i++; continue; }
                if (c==="'"){ inChar=true; i++; continue; }
                out += c; i++;
            }
            return out;
        }
        // Static-analysis "compiler": returns a list of {line, msg, why}
        function analyzeJava(rawCode) {
            const errors = [];
            const stripped = stripLiterals(rawCode);
            const strLines = stripped.split('\n');

            // 1) Brace balance
            const opens = (stripped.match(/{/g) || []).length;
            const closes = (stripped.match(/}/g) || []).length;
            if (opens !== closes) {
                errors.push({ line: null,
                    msg: opens > closes ? "error: reached end of file while parsing" : "error: class, interface, or enum expected",
                    why: `Your curly braces don't match up — ${opens} opening '{' but ${closes} closing '}'. Every '{' needs exactly one matching '}'.` });
            }
            // 2) Parenthesis balance
            const po = (stripped.match(/\(/g) || []).length;
            const pc = (stripped.match(/\)/g) || []).length;
            if (po !== pc) {
                errors.push({ line: null, msg: "error: ')' expected",
                    why: `Your parentheses don't match up — ${po} opening '(' but ${pc} closing ')'.` });
            }
            const headerRe = /^\s*(public|private|protected|static|final|abstract|class|interface|enum|void|if|else|for|while|switch|do|try|catch|finally|import|package)\b/;
            // 3) Allman style + 4) missing semicolons
            for (let idx = 0; idx < strLines.length; idx++) {
                const trimmed = strLines[idx].trim();
                if (!trimmed) continue;

                // Allman: an opening brace must sit alone on its line
                if (trimmed.includes('{') && trimmed !== '{') {
                    const before = trimmed.split('{')[0].trim();
                    errors.push({ line: idx + 1, msg: "warning: Allman brace style required",
                        why: `Line ${idx + 1}: move the opening brace '{' to its OWN line. In Allman style it should not sit next to '${before || ')'}'.` });
                }

                // Missing-semicolon detection (skip braces & continuation lines)
                if (trimmed === '{' || trimmed === '}') continue;
                const last = trimmed[trimmed.length - 1];
                if (';{}(,+-*/&|<>='.includes(last)) continue;          // already terminated or clearly continued
                // find next non-blank stripped line
                let nextNB = '';
                for (let k = idx + 1; k < strLines.length; k++){ if (strLines[k].trim()){ nextNB = strLines[k].trim(); break; } }
                if (headerRe.test(trimmed) && (nextNB.startsWith('{') || last === ')')) continue; // class/method/control header
                errors.push({ line: idx + 1, msg: "error: ';' expected",
                    why: `Line ${idx + 1}: Java statements must end with a semicolon ';'. It looks like one is missing here.` });
            }
            // 5) Misspelled structural keywords (conservative: only close, longer words)
            const dict = ['public','static','class','String','System','Scanner','import','println','printf','nextInt','nextDouble','nextLine','double','boolean'];
            // Valid Java words that must never be flagged (even if 1 letter from a dict word)
            const known = new Set([...dict,
                'print','out','in','next','hasNext','hasNextInt','hasNextDouble','close','args','length','equals',
                'Math','PI','abs','sqrt','pow','max','min','round','random','floor','ceil',
                'int','char','void','new','final','return','true','false','long','float','short','byte','this','null','main','util','java','lang']);
            const tokens = stripped.match(/[A-Za-z_]\w*/g) || [];
            const flagged = new Set();
            for (const t of tokens) {
                if (known.has(t) || flagged.has(t) || t.length < 5) continue;
                for (const d of dict) {
                    if (Math.abs(d.length - t.length) <= 1 && levDist(t, d) === 1) {
                        flagged.add(t);
                        errors.push({ line: null, msg: `error: cannot find symbol — variable ${t}`,
                            why: `'${t}' looks misspelled. Did you mean '${d}'? Java is case-sensitive, so names must match exactly.` });
                        break;
                    }
                }
            }
            return errors;
        }
        // Simulate the printed output (literal strings the program would print)
        function simulateOutput(rawCode) {
            const re = /System\s*\.\s*out\s*\.\s*(printf|println|print)\s*\(\s*("(?:\\.|[^"\\])*")?/g;
            let m, buf = '';
            while ((m = re.exec(rawCode)) !== null) {
                const kind = m[1];
                let str = m[2] ? m[2].slice(1, -1) : '';
                str = str.replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\"/g,'"').replace(/\\\\/g,'\\');
                if (kind === 'printf') buf += str.replace(/%[-0-9.]*[dfsc]/g, '▢');
                else if (kind === 'println') buf += str + '\n';
                else buf += str;
            }
            return buf;
        }
        // Allman violation check used by grading
        function hasAllmanViolation(code) {
            return stripLiterals(code).split('\n').some(l => { const t = l.trim(); return t.includes('{') && t !== '{'; });
        }
        function runCode() {
            const consoleBox = document.getElementById('console-output');
            if (!consoleBox) return;
            const taEl = document.getElementById('code-input');
            const code = (window._cmEditor ? window._cmEditor.getValue() : (taEl ? taEl.value : '')).replace(/ /g, ' ');
            const cls = classNameOf(code);
            let html = `<div class="console-header">Terminal</div>`;
            if (!code.trim()) {
                html += `<span style="color:#f87171;">error: no source code to compile</span>`;
                consoleBox.innerHTML = html; return;
            }
            const errors = analyzeJava(code);
            html += `<div style="color:#8892B0;">$ javac ${cls}.java</div>`;
            if (errors.length) {
                errors.forEach(e => {
                    const loc = `${cls}.java${e.line ? ':' + e.line : ''}: `;
                    const color = e.msg.startsWith('warning') ? '#fbbf24' : '#f87171';
                    html += `<div style="color:${color}; margin-top:8px;">${escapeHtml(loc + e.msg)}</div>`;
                    html += `<div style="color:#94a3b8; margin-left:14px; font-size:0.85rem;">&#8627; ${escapeHtml(e.why)}</div>`;
                });
                const errCount = errors.filter(e => !e.msg.startsWith('warning')).length;
                html += `<div style="color:#f87171; margin-top:10px;">${errCount} error${errCount !== 1 ? 's' : ''}</div>`;
            } else {
                html += `<div style="color:#4ade80;">&#10003; Compiled successfully</div>`;
                html += `<div style="color:#8892B0; margin-top:6px;">$ java ${cls}</div>`;
                const out = simulateOutput(code);
                if (out) html += `<pre style="color:#e6edf3; margin:4px 0 0 0; white-space:pre-wrap; font-family:inherit;">${escapeHtml(out)}</pre>`;
                if (out.includes('▢')) html += `<div style="color:#64748b; font-style:italic; margin-top:6px;">&#9634; = a value your program fills in at runtime</div>`;
                html += `<div style="color:#64748b; font-style:italic; margin-top:6px;">Looks right? Click <strong>Submit for Grading</strong>.</div>`;
            }
            consoleBox.innerHTML = html;
        }

            // Get code from CodeMirror if active, else from textarea
            const ans = (window._cmEditor ? window._cmEditor.getValue() : (inputEl ? inputEl.value : "")).trim();
            if(submitBtn) submitBtn.style.display = "none";
            if(runBtn) runBtn.style.display = "none";

            else if(inputEl) { inputEl.readOnly = true; }

            // Long-form code — check required components, then show the answer key
            if (q.requirements) {
                let missingHTML = '';
                let missingCount = 0;
                q.requirements.forEach(req => {
                    if (!new RegExp(req.pattern, 'i').test(ans)) {
                        missingCount++;
                        missingHTML += `<div style="color:#f87171; margin:3px 0;">&#10007; Missing: ${req.label}</div>`;
                    }
                });
                // Allman style is also required
                if (hasAllmanViolation(ans)) {
                    missingCount++;
                    missingHTML += `<div style="color:#f87171; margin:3px 0;">&#10007; Use Allman style — put each opening brace <code>{</code> on its own line</div>`;
                }
                const allCorrect = missingCount === 0;
                if (allCorrect) score++;

                // Feedback line
                if (allCorrect) {
                    if(fb) fb.innerHTML = `<span class="correct">&#10003; Correct! Your program meets every requirement.</span>`;
                } else {
                    if(fb) fb.innerHTML = `<span class="wrong">&#10007; ${missingCount} thing${missingCount !== 1 ? 's' : ''} to fix.</span>`;
                }

                // Results panel: missing list (only if not perfect) + answer key
                let resultHTML = `<div class="ai-hint"><div class="ai-hint-header">Submission Results</div>`;
                if (!allCorrect) {
                    resultHTML += `<div style="margin-bottom:12px;">${missingHTML}</div>`;
                    resultHTML += `<div style="color:#8892B0; font-size:0.85rem; margin-bottom:6px;">Here is a correct solution (Allman style):</div>`;
                } else {
                    resultHTML += `<div style="color:#8892B0; font-size:0.85rem; margin-bottom:6px;">Nicely done. Here is the model solution for reference:</div>`;
                }
                resultHTML += `<textarea id="sol-key"></textarea></div>`;
                if(hintArea) hintArea.innerHTML = resultHTML;

                // Render the answer key as a read-only, syntax-highlighted editor
                const solTa = document.getElementById('sol-key');
                if (solTa) {
                    solTa.value = q.solution;
                    window._cmSolution = CodeMirror.fromTextArea(solTa, {
                        mode: 'text/x-java', theme: 'dracula', lineNumbers: true, readOnly: true, lineWrapping: true
                    });
                    window._cmSolution.getWrapperElement().classList.add('solution-cm');
                    window._cmSolution.setSize(null, 'auto');
                }

            } else {
                // Short-form code (Unit 2 style) — exact match
                const norm = s => s.replace(/\s+/g, ' ').replace(/\s*=\s*/g, '=').replace(/\s*;\s*/g, ';').trim();
                const normAns = norm(ans);
                let isCorrect = normAns === norm(q.correct);
                if (!isCorrect && q.alternates) {
                    isCorrect = q.alternates.some(a => normAns === norm(a));
                }
                if (isCorrect) {
                    if(consoleBox) consoleBox.innerHTML = `<div class="console-header">Console Output</div><span style="color:#4ade80;">✓ Code compiles successfully</span>`;
                    if(fb) fb.innerHTML = `<span class="correct">✓ Correct!</span> <span class="explanation-text">Your code: <code>${q.correct}</code></span>`;
                    score++;
                } else {
                    if(consoleBox) consoleBox.innerHTML = `<div class="console-header">Console Output</div><span style="color:#f87171;">✗ Code does not match expected output</span>`;
                    if(fb) fb.innerHTML = `<span class="wrong">✗ Incorrect.</span> <span class="explanation-text">Expected: <code>${q.correct}</code></span>`;
                    if(hintArea) hintArea.innerHTML = `<div class="ai-hint"><div class="ai-hint-header">JavaLab Assistant</div><span style="color:#CCD6F6;">${q.hint}</span></div>`;
                }

        }

            const sel = document.getElementById(`iq-${qi}-opt-${oi}`);
            if (sel) sel.classList.add('selected-state');
        }

        function gradeInteractive() {
            if (interactiveGraded) return;
            interactiveGraded = true;
            score = 0;
            const tx = activeInteractive;
            tx.questions.forEach((q, i) => {
                const fb = document.getElementById(`iq-${i}-fb`);
                let isRight = false;
                if (q.type === 'mc') {
                    const sel = interactiveSelections[i];
                    document.querySelectorAll(`#iq-${i} .option-btn`).forEach((o, oi) => {
                        o.classList.add('answered');
                        o.classList.remove('selected-state');
                        if (oi === q.correct) o.classList.add('answer-correct');
                        else if (oi === sel) o.classList.add('answer-wrong');
                    });
                    isRight = sel === q.correct;
                    if (fb) fb.innerHTML = isRight
                        ? `<span class="correct">&#10003; Correct</span>`
                        : `<span class="wrong">&#10007; Incorrect</span> <span class="explanation-text">Answer: ${q.options[q.correct]}</span>`;
                } else if (q.type === 'blankMulti') {
                    const ta = document.getElementById(`iq-${i}-input`);
                    const ans = ta ? ta.value : '';
                    if (ta) ta.readOnly = true;
                    const norm = s => s.split('\n').map(l => l.trimEnd()).join('\n').trim();
                    isRight = norm(ans).toLowerCase() === norm(q.correct).toLowerCase();
                    if (!isRight && q.alternates) isRight = q.alternates.some(a => norm(ans).toLowerCase() === norm(a).toLowerCase());
                    if (ta) ta.style.borderColor = isRight ? '#4ade80' : '#f87171';
                    const disp = q.correct.replace(/\n/g, '<br>');
                    if (fb) fb.innerHTML = isRight
                        ? `<span class="correct">&#10003; Correct</span>`
                        : `<span class="wrong">&#10007; Incorrect</span> <span class="explanation-text">Expected output:<br><code style="white-space:pre-wrap;">${disp}</code></span>`;
                } else {
                    const inp = document.getElementById(`iq-${i}-input`);
                    const ans = inp ? inp.value : '';
                    if (inp) inp.readOnly = true;
                    isRight = checkBlankAnswer({ correct: q.correct, caseSensitive: false, alternates: q.alternates || [] }, ans);
                    if (inp) inp.style.borderColor = isRight ? '#4ade80' : '#f87171';
                    if (fb) fb.innerHTML = isRight
                        ? `<span class="correct">&#10003; Correct</span>`
                        : `<span class="wrong">&#10007; Incorrect</span> <span class="explanation-text">Answer: <code>${q.correct}</code></span>`;
                }
                if (isRight) score++;
            });
            const total = tx.questions.length;
            const pct = Math.round((score / total) * 100);
            const submitBtn = document.getElementById('interactive-submit');
            if (submitBtn) submitBtn.style.display = 'none';
            const res = document.getElementById('interactive-results');
            if (res) {
                res.innerHTML = `
                    <div class="challenge-container" style="text-align:center; padding:26px 20px;">
                        <h2>Your Results</h2>
                        <p style="font-size:1.4rem; color:#00F0FF; margin:14px 0;">You scored <strong>${score}</strong> / <strong>${total}</strong> (${pct}%)</p>
                        <div class="btn-row" style="justify-content:center;">
                            <button class="action-btn" onclick="startInteractive();">Try Again (new diagram)</button>
                            <button class="action-btn" onclick="score=0; closeModules();">&larr; Return to Dashboard</button>
                        </div>
                    </div>`;
                res.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // ====== UNIT 3 — METHODS QUIZ (code-trace interactive, 2 versions) ======
        const methodsQuizVersions = [

        const blankQuestionsMethods = [
            { title:"Return Type", category:"method", caseSensitive:false, alternates:[],

              prompt:"In the header below, what is the <strong>access specifier</strong>?",

            { title:"Integer Division", category:"expression", caseSensitive:false, alternates:[],

            { title:"Casting to double", category:"casting", caseSensitive:false, alternates:[],

        // ====== UNIT 3 — METHODS & CLASSES QUIZ (two classes, 2 versions) ======
        const methodsClassesQuizVersions = [
            {
                name: "Sherlock",
                code: `public class Sherlock
{
    public static void main(String[] args)

    public Mystery(double observe)

            { title:"Return Type", category:"method", caseSensitive:false, alternates:[],
              prompt:"For the method below (written in class Mystery), what is the <strong>return type</strong>?",

            { title:"Parameter", category:"method", caseSensitive:false, alternates:[],
              prompt:"For the method below, what is the full <strong>parameter</strong> (type and name)?",
              snippet:`public String investigate(int evidence)`, correct:"int evidence" },
            { title:"Constructor's Class", category:"constructor", caseSensitive:false, alternates:[],

        function startMethodsInteractive() {
            score = 0;
            activeInteractive = methodsQuizVersions[Math.floor(Math.random() * methodsQuizVersions.length)];
            interactiveSelections = activeInteractive.questions.map(() => null);
            interactiveGraded = false;
            loadInteractive();
        }
        function startMethodsClassesInteractive() {
            score = 0;
            activeInteractive = methodsClassesQuizVersions[Math.floor(Math.random() * methodsClassesQuizVersions.length)];
            interactiveSelections = activeInteractive.questions.map(() => null);
            interactiveGraded = false;
            loadInteractive();
        }
        function startMethodsBlank() {
            score = 0;
            activeBlank = shuffleArray(blankQuestionsMethods).slice(0, blankQuestionsMethods.length);
            loadBlankGeneric(0);
        }
        function startMethodsClassesBlank() {
            score = 0;
            activeBlank = shuffleArray(blankQuestionsMethodsClasses).slice(0, blankQuestionsMethodsClasses.length);
            loadBlankGeneric(0);
        }

        function showScoreReport(totalQuestions) {
            if(!displayWindow) return;
            displayWindow.classList.remove('centered-view');
            const pct = Math.round((score / totalQuestions) * 100);
            let grade = "";
            if (pct >= 90) grade = "Excellent!";
            else if (pct >= 70) grade = "Good work!";
            else if (pct >= 50) grade = "Keep practicing!";
            else grade = "Review the concepts and try again.";

            displayWindow.innerHTML = `
                <h1>Quiz Complete!</h1>
                <div class="challenge-container" style="text-align:center; padding:30px 20px;">
                    <h2>Your Results</h2>
                    <p style="font-size:1.5rem; color:#00F0FF; margin:20px 0;">
                        You scored <strong>${score}</strong> out of <strong>${totalQuestions}</strong>
                    </p>
                    <p style="color:#8892B0;">Percentage: ${pct}% — ${grade}</p>
                    <p style="color:#64748b; font-size:0.9rem; font-style:italic; margin-top:10px;">Questions are randomized — retake for a different set!</p>
                    <button class="action-btn" onclick="score=0; closeSubMenu();" style="margin-top:20px;">&larr; Return to Dashboard</button>
                </div>
            `;
        }
